name: US Stock Bot (3)

on:
  repository_dispatch:
    types: [trigger_us_bots] # ⚠️ 換成美股專用暗號，避免跟台股搞混
  workflow_dispatch:

jobs:
  run-us-bot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      - name: Install dependencies
        run: pip install pandas firebase-admin yfinance requests

      - name: Run Robot 3 (Doraemon US)
        env:
          FIREBASE_CONFIG: ${{ secrets.FIREBASE_CONFIG }}
        run: python us_market_bot.py
