name: Financial Bot Schedule
on:
  schedule:
    - cron: '30 7 * * 1-5'
    - cron: '0 9 * * 1-5'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # 更新到 v4，解決 Node.js 警告 [cite: 104]
      - name: Checkout Code
        uses: actions/checkout@v4

      # 更新到 v5，解決 Node.js 警告 [cite: 104]
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install FinMind pandas

      # 偵錯步驟：印出目前資料夾有哪些檔案
      - name: Check files
        run: ls -R

      - name: Run Strategy
        env:
          FINMIND_TOKEN: ${{ secrets.FINMIND_TOKEN }}
        run: python 全能趨勢過濾網.py
