name: Run All Stock Bots

on:
  workflow_dispatch: # 手動觸發按鈕
  schedule:
    - cron: '30 8 * * 1-5' # 台灣時間 16:30 執行

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          pip install pandas FinMind firebase-admin tqdm

      # --- 這裡開始是關鍵修改區 ---

     
     # 執行一號 (長線營收 - 假設檔案叫 long_term_rev.py)
      - name: Run Robot 1 (Long-term Revenue)
        env:
          FINMIND_TOKEN: ${{ secrets.FINMIND_TOKEN }} # 一號目前仍需要營收資料，通常由 FinMind 提供
          FIREBASE_CONFIG: ${{ secrets.FIREBASE_CONFIG }}
        run: python sentinel_revenue.py

      # 執行二號 (短線量能)
      - name: Run Robot 2 (Volume Burst)
        env:
          FIREBASE_CONFIG: ${{ secrets.FIREBASE_CONFIG }}
        run: python volume_bot.py

      # 執行四號 (法人籌碼)
      - name: Run Robot 4 (Institutional Investors)
        env:
          FIREBASE_CONFIG: ${{ secrets.FIREBASE_CONFIG }}
        run: python trend_master.py
