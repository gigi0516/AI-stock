name: TW Stock Bots (1, 2, 4)

on:
  repository_dispatch:
    types: [trigger_tw_bots] # 這是我們自訂的秘密暗號
  workflow_dispatch:         # 保留手動按鈕，方便妳隨時測試

jobs:
  run-tw-bots:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
          
      - name: Install dependencies
        run: pip install pandas FinMind firebase-admin requests tqdm yfinance beautifulsoup4 lxml

      - name: Run Robot 1 (Revenue)
        env:
          FINMIND_TOKEN: ${{ secrets.FINMIND_TOKEN }}
          FIREBASE_CONFIG: ${{ secrets.FIREBASE_CONFIG }}
        run: python sentinel_revenue.py

      - name: Run Robot 2 (Volume)
        continue-on-error: true
        env:
          FIREBASE_CONFIG: ${{ secrets.FIREBASE_CONFIG }}
        run: python volume_bot.py

      - name: Run Robot 4 (Institutional)
        continue-on-error: true
        env:
          FINMIND_TOKEN: ${{ secrets.FINMIND_TOKEN }}
          FIREBASE_CONFIG: ${{ secrets.FIREBASE_CONFIG }}
        run: python trend_master.py
