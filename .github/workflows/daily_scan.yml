name: Run All Stock Bots

on:
  workflow_dispatch:
  schedule:
    # 1. 台灣時間 16:30 (週一至週五) -> 處理台股 1, 2, 4 號
    - cron: '30 8 * * 1-5'
    # 2. 台灣時間 05:30 (週二至週六) -> 處理美股 3 號
    # 註：GitHub Cron 用的是 UTC 格式，週一到週五的 21:30 等於台灣週二到週六 05:30
    - cron: '30 21 * * 1-5'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          # 這裡必須包含 yfinance 才能跑三號
          pip install pandas FinMind firebase-admin requests tqdm yfinance

      # 執行一號 (長線營收)
      - name: Run Robot 1 (Revenue)
        env:
          FINMIND_TOKEN: ${{ secrets.FINMIND_TOKEN }}
          FIREBASE_CONFIG: ${{ secrets.FIREBASE_CONFIG }}
        run: python sentinel_revenue.py

      # 執行二號 (短線爆量)
      - name: Run Robot 2 (Volume)
        env:
          FIREBASE_CONFIG: ${{ secrets.FIREBASE_CONFIG }}
        run: python volume_bot.py

      # 執行三號 (哆啦A夢美股)
      - name: Run Robot 3 (Doraemon US)
        env:
          FIREBASE_CONFIG: ${{ secrets.FIREBASE_CONFIG }}
        run: python us_market_bot.py

      # 執行四號 (法人連買)
      - name: Run Robot 4 (Institutional)
        env:
          FIREBASE_CONFIG: ${{ secrets.FIREBASE_CONFIG }}
        run: python trend_master.py
