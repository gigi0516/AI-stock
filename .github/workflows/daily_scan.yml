name: Run All Stock Bots

on:
  workflow_dispatch:
  schedule:
    - cron: '30 8 * * 1-5'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          # 確保所有需要的套件都裝好
          pip install pandas FinMind firebase-admin requests

      # 執行一號 (營收雙增 - 需 FinMind)
      - name: Run Robot 1 (Revenue)
        env:
          FINMIND_TOKEN: ${{ secrets.FINMIND_TOKEN }}
          FIREBASE_CONFIG: ${{ secrets.FIREBASE_CONFIG }}
        run: python sentinel_revenue.py

      # 執行二號 (量能爆發 - OpenAPI)
      - name: Run Robot 2 (Volume)
        env:
          FIREBASE_CONFIG: ${{ secrets.FIREBASE_CONFIG }}
        run: python volume_bot.py

      # 執行四號 (法人連買 - OpenAPI)
      - name: Run Robot 4 (Institutional)
        env:
          FIREBASE_CONFIG: ${{ secrets.FIREBASE_CONFIG }}
        run: python trend_master.py
