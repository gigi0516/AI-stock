name: Financial Bot Schedule
on:
  schedule:
    # 台灣時間 15:30 執行 (UTC 7:30)
    - cron: '30 7 * * 1-5'
    # 台灣時間 17:00 執行 (UTC 9:00)
    - cron: '0 9 * * 1-5'
  workflow_dispatch: # 保留手動測試按鈕

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install FinMind pandas

      - name: Run Strategy
        env:
          FINMIND_TOKEN: ${{ secrets.FINMIND_TOKEN }}
        run: python 全能趨勢過濾網.py # 這裡要對應你的 Python 檔名
