name: Run All Stock Bots

on:
  workflow_dispatch: # 手動觸發按鈕
  schedule:
    - cron: '30 8 * * 1-5' # 台灣時間 16:30 執行

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          pip install pandas FinMind firebase-admin tqdm

      # --- 這裡開始是關鍵修改區 ---

      - name: Run Robot 1 (Sentinel)
        env:
          FINMIND_TOKEN: ${{ secrets.FINMIND_TOKEN }}
          FIREBASE_CONFIG: ${{ secrets.FIREBASE_CONFIG }}
        run: python sentinel_revenue.py  # 👈 執行 1 號機器人
      - name: Run Robot 4 (Trend Master)
        env:
          FINMIND_TOKEN: ${{ secrets.FINMIND_TOKEN }}
          FIREBASE_CONFIG: ${{ secrets.FIREBASE_CONFIG }}
        run: python trend_master.py   # 👈 執行 4 號機器人
